baseURL = "https://daggunders.github.io/AG-Hugo-PortalNord/"
locale = "nb-NO"
title = "PortalNord"
theme = "PaperMod"
paginate = 5
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "PortalNord"
  description = "En Hugo-nettside med PaperMod-tema"
  keywords = ["portal", "nord", "hugo", "blog"]
  author = "daggunders"
  DateFormat = "2. januar 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.assets]
    disableHLJS = true

  [params.label]
    text = "PortalNord"
    icon = "/favicon.ico"
    iconHeight = 35

  [params.homeInfoParams]
    Title = "Velkommen til PortalNord 🧭"
    Content = "Et Hugo-nettsted drevet av PaperMod-temaet. Utforsk innlegg, kategorier og mer."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/daggunders"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false

[[menu.main]]
  identifier = "posts"
  name = "Innlegg"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tagger"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "Søk"
  url = "/search/"
  weight = 30
